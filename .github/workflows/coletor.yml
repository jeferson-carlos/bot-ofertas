name: Coletor de Ofertas

on:
  schedule:
    - cron: '0 * * * *'  # Roda a cada hora
  workflow_dispatch:       # Permite rodar manualmente pelo GitHub

jobs:
  coletar:
    runs-on: ubuntu-latest

    steps:
      - name: Executar busca de ofertas
        run: |
          curl -sf -X POST "${{ secrets.SUPABASE_URL }}/functions/v1/buscar-ofertas" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}' | tee result.json
          echo "Resultado: $(cat result.json)"
