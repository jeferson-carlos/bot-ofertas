name: Coletor de Ofertas

on:
  schedule:
    - cron: '0 * * * *'  # Roda a cada hora
  workflow_dispatch:       # Permite rodar manualmente pelo GitHub

jobs:
  coletar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Instalar dependências
        run: |
          cd coletor
          pip install -r requirements.txt

      - name: Rodar coletor
        env:
          SHOPEE_APP_ID:      ${{ secrets.SHOPEE_APP_ID }}
          SHOPEE_SECRET:      ${{ secrets.SHOPEE_SECRET }}
          SUPABASE_URL:       ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:       ${{ secrets.SUPABASE_KEY }}
          TELEGRAM_TOKEN:     ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: |
          cd coletor
          python src/coletor.py

      - name: Debug secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          echo "URL começa com: ${SUPABASE_URL:0:20}"
          echo "KEY começa com: ${SUPABASE_KEY:0:10}"
          echo "KEY tamanho: ${#SUPABASE_KEY}"