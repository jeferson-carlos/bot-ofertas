name: Auto-envio de Ofertas

on:
  schedule:
    - cron: '*/5 * * * *'  # Roda a cada 5 minutos
  workflow_dispatch:         # Permite rodar manualmente pelo GitHub

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Executar auto-envio
        run: |
          HTTP_CODE=$(curl -s -o result.json -w "%{http_code}" \
            --max-time 60 \
            -X POST "${{ secrets.SUPABASE_URL }}/functions/v1/auto-enviar" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}')

          echo "HTTP Status: $HTTP_CODE"
          echo "Resultado: $(cat result.json)"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Falha no auto-envio: HTTP $HTTP_CODE"
            exit 1
          fi

          ENVIADOS=$(python3 -c "import sys,json; d=json.load(open('result.json')); print(d.get('enviados',0))" 2>/dev/null || echo "?")
          echo "✅ Auto-envio concluído — $ENVIADOS ofertas enviadas"
